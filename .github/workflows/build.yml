name: Build GUI App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: converter-win.exe
          - os: macos-latest
            artifact_name: converter-mac
          - os: ubuntu-latest
            artifact_name: converter-linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install svglib reportlab pyinstaller

      - name: Build App
        run: |
          # --noconsole: GUI専用（背後でコマンドプロンプトを出さない）
          # --onefile: 1つの実行ファイルにまとめる
          pyinstaller --noconsole --onefile --name "${{ matrix.artifact_name }}" main.py

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
