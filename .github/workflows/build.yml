name: Multi-OS Build

on:
  push:
    branches:
      - main  # mainにpushしただけでビルド開始
    tags:
      - 'v*'  # v1.0などのタグpushでも開始
  workflow_dispatch: # ボタンでも実行可能

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: converter-win.exe
          - os: macos-latest
            artifact_name: converter-mac
          - os: ubuntu-latest
            artifact_name: converter-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Linux用GUIライブラリ（これがないとubuntuで落ちる）
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Libraries
        run: |
          pip install svglib reportlab pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          pyinstaller --noconsole --onefile --name "${{ matrix.artifact_name }}" main.py

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # タグ時のみRelease作成
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./bin
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
