name: High Quality SVG to PNG Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            out_name: svg-converter-win.exe
          - os: macos-latest
            out_name: svg-converter-mac
          - os: ubuntu-latest
            out_name: svg-converter-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- 各OS固有のCairo本体インストール ---
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libcairo2-dev pkg-config python3-dev

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cairo pkg-config

      # WindowsはライブラリにCairoが同梱されるため、pipのみでOK

      - name: Install Python Libraries
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install cairosvg pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          # --noconsole: GUIアプリ（黒い画面を出さない）
          # --onefile: 全てを1つのファイルに固める
          pyinstaller --noconsole --onefile --name "${{ matrix.out_name }}" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: dist/${{ matrix.out_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./bin
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./bin/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
