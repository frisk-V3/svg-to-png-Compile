name: Multi-OS Build Full

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: svg-converter-win.exe
          - os: macos-latest
            artifact_name: svg-converter-mac
          - os: ubuntu-latest
            artifact_name: svg-converter-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 【修正ポイント】Linuxビルドに必要なシステムライブラリ（cairoを追加）
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libcairo2-dev pkg-config python3-dev

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          # 依存関係の順序を整理してインストール
          pip install reportlab 
          pip install svglib pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          # GUIアプリとしてビルド
          pyinstaller --noconsole --onefile --name "${{ matrix.artifact_name }}" main.py

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./bin
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
