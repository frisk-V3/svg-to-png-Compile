name: SVG to PNG Converter Full Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] # v1.0.0 などのタグをPushするとReleaseが作成される
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            out_name: svg-converter-win.exe
          - os: macos-latest
            out_name: svg-converter-mac
          - os: ubuntu-latest
            out_name: svg-converter-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- 各OS固有の依存関係インストール ---
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libcairo2-dev pkg-config python3-dev

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cairo pkg-config

      # --- Pythonライブラリインストール ---
      - name: Install Python Libraries
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pkgconfig
          pip install reportlab svglib pyinstaller

      # --- ビルド実行 ---
      - name: Build Executable
        shell: bash
        run: |
          # --noconsole: GUIアプリとしてビルド（背後で黒い画面を出さない）
          # --onefile: 全てを1つの実行ファイルにまとめる
          pyinstaller --noconsole --onefile --name "${{ matrix.out_name }}" main.py

      # --- 中間成果物のアップロード ---
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_name }}
          path: dist/${{ matrix.out_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # タグ（v1.0.0など）がPushされた時のみ実行
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # リリース作成権限
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-binaries
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-binaries/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
