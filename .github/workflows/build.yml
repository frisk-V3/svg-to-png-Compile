name: Multi-OS Build

on:
  push:
    tags:
      - 'v*' # v1.0.0などのタグをPushした時に発動
  workflow_dispatch: # 手動実行も可能

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            out_name: svg-converter-win.exe
          - os: macos-latest
            out_name: svg-converter-mac
          - os: ubuntu-latest
            out_name: svg-converter-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Linuxビルドに必要なGUIライブラリのインストール
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python Libraries
        run: |
          pip install --upgrade pip
          pip install svglib reportlab pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          # --noconsole: GUIのみ表示（Windowsで黒い画面を出さない）
          # --onefile: 1つの実行ファイルにまとめる
          pyinstaller --noconsole --onefile --name "${{ matrix.out_name }}" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: dist/${{ matrix.out_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # これがないとRelease作成に失敗します
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
